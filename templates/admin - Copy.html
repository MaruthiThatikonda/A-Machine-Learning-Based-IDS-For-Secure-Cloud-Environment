{% extends "base.html" %}
{% block title %} Admin Config{% endblock %}
{% block content %}
<div class="container" style="max-width:800px; margin-top:4rem;">
  <div class="card shadow-lg p-4" style="background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:16px;">
    <h2 class="text-info mb-4"><i class="fa-solid fa-microchip"></i>  Device Configuration</h2>
    
    <form method="POST">
      <div class="mb-3">
        <label class="form-label text-light"> Device Name</label>
        <input type="text" name="device_name" class="form-control bg-dark text-light" value="{{ config.device_name }}" required>
      </div>
      
      <div class="mb-3">
        <label class="form-label text-light">IP Address (Auto-Fetched)</label>
        <input type="text" class="form-control bg-secondary text-light" value="{{ config.ip_address }}" readonly>
        <small class="text-muted">This is the local IP of the hosted device.</small>
      </div>

      <hr class="border-secondary my-4">
      
      <h4 class="text-warning mb-3"><i class="fa-solid fa-shield"></i> Security Policies</h4>
      
      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" name="ipv4" id="ipv4" {% if config.ipv4_enabled %}checked{% endif %}>
        <label class="form-check-label text-light" for="ipv4">Enable IPv4 Traffic</label>
      </div>
      
      <div class="form-check form-switch mb-2">
        <input class="form-check-input" type="checkbox" name="tcp" id="tcp" {% if config.tcp_enabled %}checked{% endif %}>
        <label class="form-check-label text-light" for="tcp">Enable TCP Connections</label>
      </div>

      <!-- <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" name="syn_flood" id="syn" {% if config.syn_flood_rule %}checked{% endif %}>
        <label class="form-check-label text-danger" for="syn"><strong>Rule:</strong> Detect SYN Flood Behavior</label>
      </div> -->

      <div class="mb-3">
        <label class="form-label text-light">Admin Email (for Alerts)</label>
        <input type="email" name="admin_email" class="form-control bg-dark text-light" value="{{ config.admin_email }}" placeholder="admin@iot-secure.com">
      </div>

      <hr class="border-secondary my-4">

      <div class="d-flex justify-content-between align-items-center p-3 rounded" style="background: rgba(0,0,0,0.3);">
        <div>
          <h5 class="text-light m-0"> Device Status</h5>
          <small class="text-muted">Turn ON to process traffic and enable IDS.</small>
        </div>
        <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="device_status" style="transform: scale(1.5);" {% if config.status == 'ON' %}checked{% endif %}>
        </div>
      </div>

      <div class="mt-4 text-end">
        <button type="submit" class="btn btn-info btn-lg px-5">Save Configuration</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
